<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet" href="/static/auth.css">

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>AI Chat Bot</h1>

            <p>Login to continue</p>

            <form action="/login" method="post">

                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required
                >

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                >

                <button type="submit">
                    Login
                </button>

            </form>

            <a href="/signup">
                Create Account
            </a>

        </div>

    </div>

</body>

</html>
