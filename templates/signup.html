<!DOCTYPE html>
<html>

<head>

    <title>Signup</title>

    <link rel="stylesheet" href="/static/auth.css">

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>Naveel AI</h1>

            <p>Create your account</p>

            <form action="/signup" method="post">

                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required
                >

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                >

                <button type="submit">
                    Signup
                </button>

            </form>

            <a href="/login">
                Already have account?
            </a>

        </div>

    </div>

</body>

</html>
